name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same branch to save runner minutes
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v5
      - name: SwiftLint
        run: swiftlint   # preinstalled on the image

  test:
    runs-on: macos-26
    env:
      SCHEME: AMRecommendation                                   # <-- your shared scheme name
      DESTINATION: 'platform=iOS Simulator,name=iPhone 17'  # must match snapshot references
    steps:
      - uses: actions/checkout@v5

      - name: Pin Xcode 26.5
        run: sudo xcode-select -s /Applications/Xcode_26.5.app

      - name: Versions
        run: xcodebuild -version && swift --version

      - name: Cache SPM
        uses: actions/cache@v4
        with:
          path: DerivedData/SourcePackages
          key: spm-${{ hashFiles('**/Package.resolved') }}
          restore-keys: spm-

      - name: Resolve packages
        run: xcodebuild -resolvePackageDependencies -scheme "$SCHEME" -derivedDataPath DerivedData

      - name: Build & test
        run: |
          set -o pipefail
          xcodebuild test \
            -scheme "$SCHEME" \
            -destination "$DESTINATION" \
            -derivedDataPath DerivedData \
            -resultBundlePath TestResults.xcresult \
            CODE_SIGNING_ALLOWED=NO \
            | xcbeautify

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: TestResults.xcresult